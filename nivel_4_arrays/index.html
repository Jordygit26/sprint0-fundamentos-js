<!doctype html>
<html lang="es">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Restaurante — Día 1</title>
<style>
 .normal { color: black; }
 .bajo { color: orange; font-weight: bold; }
 .agotado { color: red; font-weight: bold; }
</style>
</head>
<body>
 <h1>Menú del Restaurante</h1>

 <button id="btnMostrar">Mostrar menú</button>
 <button id="btnAgregar">Agregar plato demo</button>

<h2>Herramientas</h2>

<input id="inputBuscar" placeholder="Buscar plato por nombre" />
<button id="btnBuscar">Buscar</button>

<button id="btnStockBajo">Ver stock bajo (&lt;= 3)</button>

<button id="btnResumen">Ver resumen</button>

<input id="inputVenderNombre" placeholder="Nombre del plato" />
<input id="inputVenderCantidad" type="number" placeholder="cantidad" min="1" />
<button id="btnVender">Vender plato</button>

 <div id="output"></div>

 <script src="./app.js"></script>


</body>
</html>
